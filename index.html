<!doctype html>
<html lang="en" class="app-loading">
<head>
<meta charset="utf-8">
<title>beeins</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<!-- Resolves the bare "onnxruntime-web" specifier that the vendored Piper TTS
     imports at runtime (must load before any module import runs). -->
<script type="importmap">
{ "imports": { "onnxruntime-web": "https://esm.sh/onnxruntime-web@1.18.0" } }
</script>
<script>try{var t=localStorage.getItem('beeins_theme')||localStorage.getItem('swipua_theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);var sk=localStorage.getItem('beeins_skin');if(sk)document.documentElement.setAttribute('data-skin',sk);}catch(e){}</script>
</head>
<body>

<!-- Shimmer skeleton shown until app.js finishes wiring the UI (the corpus files
     are large, so a fresh load or a language switch can take a moment). app.js
     removes `app-loading` from <html> once the first card is painted. -->
<div id="appSkeleton" aria-hidden="true">
  <div class="skTopbar">
    <span class="sk skPill" style="width:52px"></span>
    <span class="sk skPill" style="width:150px"></span>
    <span class="sk skPill" style="width:132px"></span>
    <span class="sk skPill" style="width:70px"></span>
    <span class="sk skPill" style="width:64px"></span>
    <span class="sk skPill skGrow"></span>
    <span class="sk skPill" style="width:60px"></span>
    <span class="sk skPill" style="width:44px"></span>
  </div>
  <div class="skDeck"><div class="sk skCard"></div></div>
</div>

<header id="topbar">
  <div id="topbarMain">
  <div id="topleft">
    <div class="langDrop" id="learnDrop" data-set="learn">
      <button type="button" class="langDropBtn" id="learnDropBtn" aria-haspopup="listbox" aria-expanded="false" title="Language to learn" aria-label="Language to learn">
        <span class="ldFlags" id="learnFlag" aria-hidden="true"></span>
        <span class="ldLearnName" id="learnFace"></span>
        <span class="ldCaret" aria-hidden="true">▾</span>
      </button>
      <div class="langDropPanel" id="learnPanel" role="listbox" aria-label="Language to learn" hidden></div>
    </div>
    <div id="langDrops">
      <div class="langDrop" data-set="show">
        <button type="button" class="langDropBtn" id="showDropBtn" aria-haspopup="listbox" aria-expanded="false">
          <span class="ldLabel" id="lblShow" title="Languages shown as prompts and as translations">From</span>
          <span class="ldFlags" id="showFlags" aria-hidden="true"></span>
          <span class="ldCaret" aria-hidden="true">▾</span>
        </button>
        <div class="langDropPanel" id="showPanel" role="listbox" aria-multiselectable="true" aria-label="Languages" hidden></div>
      </div>
    </div>
    <nav id="viewNav" role="tablist" aria-label="View">
      <button type="button" id="navCards" class="viewBtn active" role="tab" aria-selected="true">Cards</button>
      <button type="button" id="navGrammar" class="viewBtn" role="tab" aria-selected="false">Grammar</button>
    </nav>
    <nav id="levelNav" role="group" aria-label="CEFR level">
      <button type="button" class="levelBtn" data-level="A1">A1</button>
      <button type="button" class="levelBtn" data-level="A2">A2</button>
      <button type="button" class="levelBtn" data-level="B1">B1</button>
    </nav>
    <div class="langDrop" id="topicDrop" data-set="topics">
      <button type="button" class="langDropBtn" id="topicDropBtn" aria-haspopup="listbox" aria-expanded="false" title="Filter the deck by topic">
        <span class="ldLabel" id="lblTopics">topics</span>
        <span class="ldFlags" id="topicFace" aria-hidden="true"></span>
        <span class="ldCaret" aria-hidden="true">▾</span>
      </button>
      <div class="langDropPanel" id="topicPanel" role="listbox" aria-multiselectable="true" aria-label="Topics" hidden></div>
    </div>
  </div>
  <div id="topright">
    <div class="langDrop" id="sessionDrop">
      <button type="button" class="langDropBtn" id="sessionDropBtn" aria-haspopup="listbox" aria-expanded="false" title="Cards per session" aria-label="Cards per session">
        <span class="ldFlags" id="sessionFace">25</span>
        <span class="ldCaret" aria-hidden="true">▾</span>
      </button>
      <div class="langDropPanel" id="sessionPanel" role="listbox" aria-label="Cards per session" hidden></div>
    </div>
    <div class="langDrop" id="themeDrop">
      <button type="button" class="langDropBtn" id="themeDropBtn" aria-haspopup="listbox" aria-expanded="false" title="Colour theme" aria-label="Colour theme">
        <span class="ldFlags" id="themeFace">🌿</span>
        <span class="ldCaret" aria-hidden="true">▾</span>
      </button>
      <div class="langDropPanel" id="themePanel" role="listbox" aria-label="Colour theme" hidden></div>
    </div>
    <button type="button" id="themeToggle" title="Switch light / dark theme" aria-label="Switch light or dark theme">🌙</button>
    <button type="button" id="resetBtn" title="Reset progress" aria-label="Reset progress">↺</button>
    <div id="progress">0 / 0</div>
  </div>
  </div>
  <nav id="grammarIndex" class="hidden" aria-label="Grammar topics"></nav>
</header>

<main id="deck">
  <div id="card" class="answer-hidden">
    <div id="cardTopics" aria-label="Topics for this word"></div>
    <div id="word"></div>
    <div id="wordReading"></div>
    <div id="synonyms"></div>
    <div id="revealHint">Tap the card or press any key to reveal</div>
    <div id="translations"></div>
    <div id="examples"></div>
  </div>
</main>

<footer id="controls">
  <button id="btnBack" title="Look at the previous card">‹ Back</button>
  <button id="btnUnknown">✗ Don't know <kbd>Space</kbd></button>
  <button id="btnKnown">✓ Know <kbd>Enter</kbd></button>
  <button id="btnForward" class="hidden">Back to current ›</button>
</footer>

<section id="stats" class="hidden">
  <h1 id="statsTitle">Done!</h1>
  <div id="statNumbers"></div>
  <div id="unknownList"></div>
  <button id="btnReload">Reload page to start over</button>
</section>

<section id="grammar" class="hidden">
  <div id="grammarBody"></div>
</section>

<script>
// Load the corpus + grammar for the language being learned. Each target ships
// its own vocabulary and grammar file; only the selected one is fetched.
(function () {
  var t = "de";
  try { var v = localStorage.getItem("beeins_learn"); if (v === "de" || v === "tr" || v === "es_ar" || v === "fr" || v === "ru" || v === "it" || v === "uk" || v === "hr" || v === "be" || v === "en") t = v; } catch (e) {}
  var byTarget = {
    tr:    ["data-tr.js", "grammar-tr.js"],
    es_ar: ["data-es.js", "grammar-es.js"],
    fr:    ["data-fr.js", "grammar-fr.js"],
    ru:    ["data-ru.js", "grammar-ru.js"],
    it:    ["data-it.js", "grammar-it.js"],
    uk:    ["data-uk.js", "grammar-uk.js"],
    hr:    ["data-hr.js", "grammar-hr.js"],
    be:    ["data-be.js", "grammar-be.js"],
    en:    ["data-en.js", "grammar-en.js"]
  };
  // Load corpus → grammar → topics → app sequentially but WITHOUT blocking the
  // first paint (document.write would stall rendering until the big corpus file
  // finished downloading and parsing). The skeleton stays visible meanwhile.
  var files = (byTarget[t] || ["data.js", "grammar.js"]).concat(["topics.js", "app.js"]);
  var i = 0;
  (function next() {
    if (i >= files.length) return;
    var s = document.createElement("script");
    s.src = files[i++];
    s.onload = next;
    s.onerror = next; // keep going even if one file is missing
    document.head.appendChild(s);
  })();
})();
</script>
</body>
</html>
