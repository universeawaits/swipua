<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>beeins</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script>try{var t=localStorage.getItem('beeins_theme')||localStorage.getItem('swipua_theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
</head>
<body>

<header id="topbar">
  <div id="topbarMain">
  <div id="topleft">
    <select id="learnLang" title="Language to learn" aria-label="Language to learn">
      <option value="de">🇩🇪 Deutsch</option>
      <option value="tr">🇹🇷 Türkçe</option>
    </select>
    <nav id="viewNav" role="tablist" aria-label="View">
      <button type="button" id="navCards" class="viewBtn active" role="tab" aria-selected="true">Cards</button>
      <button type="button" id="navGrammar" class="viewBtn" role="tab" aria-selected="false">Grammar</button>
    </nav>
    <nav id="levelNav" role="group" aria-label="CEFR level">
      <button type="button" class="levelBtn" data-level="A1">A1</button>
      <button type="button" class="levelBtn" data-level="A2">A2</button>
      <button type="button" class="levelBtn" data-level="B1">B1</button>
    </nav>
    <div id="langDrops">
      <div class="langDrop" data-set="title">
        <button type="button" class="langDropBtn" id="askDropBtn" aria-haspopup="listbox" aria-expanded="false">
          <span class="ldLabel" id="lblAsk" title="Which languages can appear as the prompt word (before you reveal)">ask</span>
          <span class="ldFlags" id="askFlags" aria-hidden="true"></span>
          <span class="ldCaret" aria-hidden="true">▾</span>
        </button>
        <div class="langDropPanel" id="askPanel" role="listbox" aria-multiselectable="true" aria-label="Prompt languages" hidden></div>
      </div>
      <div class="langDrop" data-set="show">
        <button type="button" class="langDropBtn" id="showDropBtn" aria-haspopup="listbox" aria-expanded="false">
          <span class="ldLabel" id="lblShow" title="Which translations appear after you reveal the card">show</span>
          <span class="ldFlags" id="showFlags" aria-hidden="true"></span>
          <span class="ldCaret" aria-hidden="true">▾</span>
        </button>
        <div class="langDropPanel" id="showPanel" role="listbox" aria-multiselectable="true" aria-label="Answer languages" hidden></div>
      </div>
    </div>
  </div>
  <div id="topright">
    <select id="sessionSize" title="Cards per session" aria-label="Cards per session">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="all">All</option>
    </select>
    <button type="button" id="themeToggle" title="Switch light / dark theme" aria-label="Switch light or dark theme">🌙</button>
    <button type="button" id="resetBtn" title="Reset progress" aria-label="Reset progress">↺</button>
    <div id="progress">0 / 0</div>
  </div>
  </div>
  <nav id="grammarIndex" class="hidden" aria-label="Grammar topics"></nav>
</header>

<main id="deck">
  <div id="card" class="answer-hidden">
    <div id="word"></div>
    <div id="synonyms"></div>
    <div id="revealHint">Tap the card or press any key to reveal</div>
    <div id="translations"></div>
    <div id="examples"></div>
  </div>
</main>

<footer id="controls">
  <button id="btnBack" title="Look at the previous card">‹ Back</button>
  <button id="btnUnknown">✗ Don't know <kbd>Space</kbd></button>
  <button id="btnKnown">✓ Know <kbd>Enter</kbd></button>
  <button id="btnForward" class="hidden">Back to current ›</button>
</footer>

<section id="stats" class="hidden">
  <h1 id="statsTitle">Done!</h1>
  <div id="statNumbers"></div>
  <div id="unknownList"></div>
  <button id="btnReload">Reload page to start over</button>
</section>

<section id="grammar" class="hidden">
  <div id="grammarBody"></div>
</section>

<script src="data.js"></script>
<script src="grammar.js"></script>
<script src="app.js"></script>
</body>
</html>
